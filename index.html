<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inducción | sinba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #511191; --lila: #E9D5FF; --light: #F9FAFB; --correct: #27ae60; --incorrect: #e74c3c; --gray: #d1d5db; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--light); color: #333; margin: 0; padding: 0; }
        
        /* Línea de Tiempo Superior */
        .timeline-container { width: 100%; max-width: 600px; margin: 20px auto; display: flex; justify-content: space-between; align-items: flex-start; position: relative; padding: 0 10px; }
        .timeline-line { position: absolute; top: 15px; left: 40px; right: 40px; height: 2px; background: var(--gray); z-index: 1; }
        .timeline-progress { position: absolute; top: 15px; left: 40px; height: 2px; background: var(--purple); z-index: 2; transition: width 0.4s ease; width: 0%; }
        .step-item { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; width: 60px; cursor: pointer; transition: 0.3s; }
        .step-circle { width: 30px; height: 30px; border-radius: 50%; background: white; border: 2px solid var(--gray); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; margin-bottom: 5px; }
        .step-label { font-size: 9px; text-align: center; font-weight: 600; text-transform: uppercase; color: var(--gray); }
        .step-item.active .step-circle { border-color: var(--purple); background: var(--purple); color: white; }
        .step-item.active .step-label { color: var(--purple); }
        .step-item.completed .step-circle { background: var(--purple); border-color: var(--purple); color: white; }
        .disabled { cursor: not-allowed; opacity: 0.5; pointer-events: none; }

        /* Card Principal */
        .app-card { background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 500px; min-height: 580px; display: flex; flex-direction: column; position: relative; margin: 0 auto 40px auto; }
        .fixed-logo-container { padding: 25px 0 0 0; width: 100%; display: flex; justify-content: center; }
        .logo { max-height: 50px; display: block; object-fit: contain; }
        .content-body { padding: 20px 25px 100px 25px; flex-grow: 1; text-align: center; }
        
        /* Botones e Inputs */
        .btn-sinba { background: var(--purple); color: white; padding: 16px 20px; border-radius: 14px; border: none; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; font-size: 15px; transition: 0.2s; text-transform: lowercase; }
        .btn-sinba:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-next-step { background: #333; margin-top: 25px; display: none; animation: fadeIn 0.5s; }
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; }

        /* JUEGO DE EMPAREJAR */
        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .match-card { perspective: 1000px; height: 140px; cursor: pointer; position: relative; }
        .match-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .match-card.is-flipped .match-card-inner { transform: rotateY(180deg); }
        .match-front, .match-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border: 1px solid #eee; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .match-front img { height: 60px; object-fit: contain; margin-bottom: 8px; pointer-events: none; }
        .match-front span { font-size: 10px; font-weight: 600; color: #444; pointer-events: none; }
        .match-back { transform: rotateY(180deg); color: white; text-align: center; font-size: 11px; padding: 10px; }
        .selected-lila .match-front { background-color: var(--lila) !important; border-color: var(--purple); }
        .bg-correct { background-color: var(--correct) !important; border: none; }
        .bg-incorrect { background-color: var(--incorrect) !important; border: none; }

        /* REJILLA TEMA 1 Y TEST */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .flip-card { perspective: 1000px; width: 100%; height: 110px; cursor: pointer; position: relative; }
        .flip-card-grid { height: 180px !important; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; align-items: center; justify-content: center; padding: 15px; font-weight: 600; font-size: 13px; color: white; }
        .flip-card-front { background-color: var(--purple); text-transform: lowercase; }
        .flip-card-front-white { background-color: white !important; color: #444 !important; border: 1px solid #eee; flex-direction: column; padding: 10px !important; }
        .flip-card-front-white img { width: 85%; height: 100px; object-fit: contain; margin-bottom: 8px; }
        .flip-card-front-white span { font-size: 11px; line-height: 1.2; font-weight: 600; }
        .flip-card-back { transform: rotateY(180deg); font-size: 12px; font-weight: 400; text-align: left; flex-direction: column; align-items: flex-start; }

        .nav-footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: white; border-radius: 0 0 24px 24px; }
        .nav-btn { color: var(--purple); font-weight: 600; cursor: pointer; font-size: 13px; padding: 8px; }
        .img-content { width: 100%; border-radius: 15px; margin: 15px 0; max-height: 250px; object-fit: contain; background: #f9f9f9; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; border-radius: 15px; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top:0; left: 0; width: 100%; height: 100%; }
        .fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .col-span-2 { grid-column: span 2 / span 2; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4">

    <!-- Línea de Tiempo -->
    <div class="timeline-container" id="timeline">
        <div class="timeline-line"></div>
        <div class="timeline-progress" id="timeline-progress"></div>
        <div class="step-item" id="step-1" onclick="jumpTo('intro')"><div class="step-circle">1</div><div class="step-label">Datos</div></div>
        <div class="step-item" id="step-2" onclick="jumpTo('tema1_1')"><div class="step-circle">2</div><div class="step-label">Tema 1</div></div>
        <div class="step-item" id="step-3" onclick="jumpTo('tema2_1')"><div class="step-circle">3</div><div class="step-label">Tema 2</div></div>
        <div class="step-item" id="step-4" onclick="jumpTo('tema3_video')"><div class="step-circle">4</div><div class="step-label">Tema 3</div></div>
        <div class="step-item disabled" id="step-5"><div class="step-circle">5</div><div class="step-label">Test</div></div>
    </div>

    <div class="app-card">
        <div class="fixed-logo-container"><img src="logo.png" class="logo" alt="sinba"></div>
        <div class="content-body fade" id="app-content"></div>
        <div class="nav-footer" id="main-nav" style="display: none;">
            <div class="nav-btn" onclick="goBack()">← anterior</div>
            <div class="nav-btn" onclick="goHome()">🏠 inicio</div>
        </div>
    </div>

    <script>
        let state = { 
            step: "intro", 
            history: [], 
            userName: "", 
            userDni: "", 
            score: 0, 
            testAttempts: 0,
            matchingSelections: { left: null, right: null },
            matchesFound: 0
        };

        const phases = {
            "datos": ["intro", "registro", "confirmacion", "politica", "ruta"],
            "tema1": ["tema1_1", "tema1_org", "tema1_rec", "practica1", "tema1_tips", "tema1_gen"],
            "tema2": ["tema2_1", "tema2_bolsas", "tema2_bolsas_res", "tema2_acopio"],
            "tema3": ["tema3_video", "tema3_practica", "tema3_fin"],
            "test": ["test_intro", "q1", "q2", "q3", "q4", "q5", "resultado"]
        };

        const steps = {
            "intro": { content: `¡Hola!👋 ¿Te imaginas un mundo sin basura, donde todos los materiales se reutilizan y no dañan el medio ambiente?<br><br>En este micro curso aprenderás cómo segregar correctamente en tu empresa. Al finalizar, recibirás un certificado. ¿Listo para iniciar?`, buttons: [{ text: "registrarme", next: "registro" }] },
            "registro": { content: `🟩⬜⬜⬜⬜⬜<br><br>¡Muy bien! Por favor, escribe tu nombre y apellido completo y tu DNI para tu certificado.`, inputs: [{ id: "n", placeholder: "Nombre y Apellido", key: "userName" }, { id: "d", placeholder: "DNI", key: "userDni" }], buttons: [{ text: "continuar", next: "confirmacion" }] },
            "confirmacion": { dynamicContent: () => `🟩🟩⬜⬜⬜<br><br>¿Te parece bien que usemos estos datos para tu constancia?<br><b>${state.userName}</b><br>DNI: ${state.userDni}`, buttons: [{ text: "sí, está bien", next: "politica" }, { text: "no, corregir", next: "registro" }] },
            "politica": { content: `Antes de empezar, ¿aceptas nuestra política de confidencialidad?<br><br>https://sinba.pe/politica-de-privacidad-de-datos/`, buttons: [{ text: "acepto", next: "ruta" }, { text: "no acepto", feedback: "Es necesario aceptar para continuar.", next: "politica" }] },
            "ruta": { content: `<b>Ruta de aprendizaje</b><br><br>Este curso cuenta con los siguientes módulos:<br><br>Tema 1: ¿Cómo debo segregar? Categorías de residuos<br>Tema 2: ¿Dónde lo separo? Lineamientos operativos<br>Tema 3: ¿A dónde se van mis residuos? El ciclo sinba<br>Test: Evaluación final para certificarte<br><br>Al finalizar la evaluación recibirás tu certificado descargable con tus datos.`, buttons: [{ text: "¡empecemos!", next: "tema1_1" }] },
            
            // TEMA 1
            "tema1_1": { content: `<b>Tema 1: ¿Cómo debo segregar?</b><br><br>Clasificar correctamente tus residuos permite que puedan ser reciclados, reutilizados o compostados.🌿♻️<br><br>En adelante tus residuos se clasificarán en 3 categorías: orgánicos, reciclables y generales.`, image: "Imagen2.png", buttons: [{ text: "revisemos cada categoría", next: "tema1_org" }] },
            "tema1_org": { content: `🌱 <b>Residuos orgánicos (tacho marrón)</b><br><br>Residuos que pueden descomponerse rápidamente ya que derivan de insumos animales o vegetales.`, video: "https://www.youtube.com/embed/dQw4w9WgXcQ", buttons: [{ text: "continuar", next: "tema1_rec" }] },
            "tema1_rec": { content: `♻️ <b>Reciclaje (tacho verde)</b><br><br>Materiales que pueden ser tratados para convertirse en nuevos productos: plástico, papel, cartón, metales y vidrios.<br><br>⚠️ ¡Recuerda! Si estos materiales están muy contaminados, ya no podrán reciclarse.`, video: "https://www.youtube.com/embed/dQw4w9WgXcQ", buttons: [{ text: "continuar", next: "practica1" }] },
            
            "practica1": { 
                isGridTest: true,
                content: `¿Cuáles de estos residuos pueden ser reciclados? Dale click a las imágenes que irían al tacho verde.`, 
                buttons: [
                { text: "lata con restos de atún", img: "ejemplo1.png", isCorrect: false, feedback: "⚠️ Si tiene muchos restos de comida, debe ir a la basura. Si quitamos el contenido, puede ir a reciclaje.", next: "tema1_tips" },
                { text: "un tetrapack (caja de leche)", img: "ejemplo2.png", isCorrect: true, feedback: "✅ Es reciclable.", next: "tema1_tips" },
                { text: "una botella de vidrio", img: "ejemplo3.png", isCorrect: true, feedback: "✅ Es reciclable.", next: "tema1_tips" },
                { text: "una taza", img: "ejemplo4.png", isCorrect: false, feedback: "❌ No es reciclable, su densidad es mayor y soporta el calor más que el vidrio. Va a la basura", next: "tema1_tips" }
            ]},

            "tema1_tips": { content: `Hay diferentes tips para identificar cuándo tenemos residuos reciclables y cuándo no. Aquí tienes algunos:`, image: "Imagen9.png", buttons: [{ text: "continuar", next: "tema1_gen" }] },
            "tema1_gen": { content: `🚮 <b>Residuos generales o basura (tacho negro)</b><br><br>Envases sucios, contaminados o degradados y todo aquel residuo que no podamos reaprovechar.`, video: "https://www.youtube.com/embed/dQw4w9WgXcQ", buttons: [{ text: "continuar al tema 2", next: "tema2_1" }] },

            // TEMA 2
            "tema2_1": { content: `<b>Tema 2: ¿Dónde lo separo? Lineamientos operativos</b><br><br>En tu lugar de trabajo, debes identificar tus tachos señalizados:<br>🟤 Marrón: Orgánicos<br>🟢 Verde: Reciclaje<br>⚫ Negro: Basura`, buttons: [{ text: "continuar", next: "tema2_bolsas" }] },
            
            "tema2_bolsas": { 
                isMatching: true, 
                content: `¿Qué bolsa debo colocar en cada tacho? Une cada color de bolsa con su tacho:`, 
                next: "tema2_bolsas_res",
                leftItems: [
                    { id: 'L0', text: 'Bolsa Marrón', img: 'bolsa_marron.png', matchId: 'R1', feedback: '✅ Correcto: Va al tacho marrón.' },
                    { id: 'L1', text: 'Bolsa Transparente', img: 'bolsa_transparente.png', matchId: 'R2', feedback: '✅ Correcto: Va al tacho verde.' },
                    { id: 'L2', text: 'Bolsa Negra', img: 'bolsa_negra.png', matchId: 'R0', feedback: '✅ Correcto: Va al tacho negro.' }
                ],
                rightItems: [
                    { id: 'R0', text: 'Tacho Basura', img: 'tacho_negro.png' },
                    { id: 'R1', text: 'Tacho Orgánicos', img: 'tacho_marron.png' },
                    { id: 'R2', text: 'Tacho Reciclaje', img: 'tacho_verde.png' }
                ]
            },

            "tema2_bolsas_res": { content: `Cada tacho debe seguir el código de color de la bolsa. El uso de bolsas de colores evita confusiones al momento del retiro.`, image: "Imagen19.png", buttons: [{ text: "¡entendido! continuemos", next: "tema2_acopio" }] },
            "tema2_acopio": { content: `Al retirar las bolsas, llévalas al acopio. Aquí es donde están listos para ser llevados al Nodo sinba y ser reaprovechados.`, image: "Imagen20.png", buttons: [{ text: "continuar al tema 3", next: "tema3_video" }] },

            // TEMA 3
            "tema3_video": { content: `<b>Tema 3: ¿A dónde van mis residuos? El ciclo sinba</b><br><br>Mira qué pasa en nuestra Biofábrica y CIRC cuando dejas tus residuos en el acopio.🌍✨`, video: "https://www.youtube.com/embed/dQw4w9WgXcQ", buttons: [{ text: "continuar", next: "tema3_practica" }] },
            "tema3_practica": { isTest: true, content: `Situación: Una bolsa de orgánicos llega con guantes de látex, envoltorios y botellas mezcladas. ¿Qué hacemos?`, buttons: [
                { text: "procesarlos igual", isCorrect: false, feedback: "❌ Incorrecto. No se pueden procesar residuos orgánicos contaminados.", next: "tema3_fin" },
                { text: "enviarlos a la basura", isCorrect: true, feedback: "✔️ Correcto. Se pierde la posibilidad de compost y deben ir al relleno.", next: "tema3_fin" }
            ]},
            "tema3_fin": { content: `¡Tú eres parte fundamental de nuestro ciclo de recuperación de residuos!<br><br>¿Ya estás listo para poner a prueba lo aprendido?`, buttons: [{ text: "empecemos con el test", next: "test_intro" }] },

            // TEST FINAL (3 OPCIONES FIJAS)
            "test_intro": { content: `📝 <b>¿Listo para poner a prueba lo que aprendiste?</b><br><br>Responderás 5 preguntas. Necesitas acertar al menos 3 para obtener tu constancia.`, buttons: [{ text: "comencemos", next: "q1" }] },
            
            "q1": { isTest: true, content: `1️⃣ ¿Dónde va una bolsa de carnes o embutidos al vacío? 🥩`, 
                buttons: [
                    { text: "orgánicos", isCorrect: false, feedback: "❌ No es correcto. Tienen grasas residuales.", next: "q2" },
                    { text: "reciclables", isCorrect: false, feedback: "❌ No es correcto. La sangre impide su reciclaje.", next: "q2" },
                    { text: "generales", isCorrect: true, feedback: "✔️ Correcto. Va al tacho negro.", next: "q2" }
                ] 
            },
            "q2": { isTest: true, content: `2️⃣ ¿Dónde deben ir restos vegetales o animales, como cáscaras de plátano? 🍌`, 
                buttons: [
                    { text: "orgánicos", isCorrect: true, feedback: "✔️ ¡Excelente! Sirven para compostaje.", next: "q3" },
                    { text: "reciclables", isCorrect: false, feedback: "❌ No es correcto. Se compostan, no se reciclan.", next: "q3" },
                    { text: "generales", isCorrect: false, feedback: "❌ No es correcto. ¡Pueden tener segunda vida!", next: "q3" }
                ] 
            },
            "q3": { isTest: true, content: `3️⃣ ¿Dónde debe ir una bolsa de leche vacía? 🥛`, 
                buttons: [
                    { text: "orgánicos", isCorrect: false, feedback: "❌ No es correcto. No es compostable.", next: "q4" },
                    { text: "reciclables", isCorrect: false, feedback: "❌ No es correcto. Son capas no reciclables.", next: "q4" },
                    { text: "generales", isCorrect: true, feedback: "✔️ ¡Correcto! Va al tacho negro.", next: "q4" }
                ] 
            },
            "q4": { isTest: true, content: `4️⃣ ¿Dónde deben ir las envolturas de plástico, como empaques de fideos?`, 
                buttons: [
                    { text: "orgánicos", isCorrect: false, feedback: "❌ No es correcto.", next: "q5" },
                    { text: "reciclables", isCorrect: false, feedback: "❌ No es correcto. Este plástico cruje y no se recicla.", next: "q5" },
                    { text: "generales", isCorrect: true, feedback: "✔️ ¡Correcto! Va al tacho negro.", next: "q5" }
                ] 
            },
            "q5": { isTest: true, content: `5️⃣ ¿Dónde deben ir las latas (como las de gaseosa o conservas)? 🥫`, 
                buttons: [
                    { text: "orgánicos", isCorrect: false, feedback: "❌ No es correcto.", next: "resultado" },
                    { text: "reciclables", isCorrect: true, feedback: "✔️ ¡Correcto! Si están limpias van al verde.", next: "resultado" },
                    { text: "generales", isCorrect: false, feedback: "❌ No es correcto. ¡Súmalas al reciclaje!", next: "resultado" }
                ] 
            },

            "resultado": {
                dynamicContent: () => state.score >= 3 ? 
                    `🎉 ¡Felicitaciones!<br>Has acertado ${state.score} de 5 preguntas.<br>Gracias por ser parte del cambio y apostar por un mundo sin basura. 💜` :
                    `Has acertado ${state.score} de 5 preguntas.<br>Ánimo, esta vez no alcanzaste el mínimo, pero tienes una oportunidad más.`,
                dynamicButtons: () => {
                    if(state.score >= 3) return [{ text: "descargar certificado pdf", action: downloadPDF }, { text: "volver al inicio", next: "intro" }];
                    if(state.testAttempts < 1) return [{ text: "probar una vez más", action: retryTest }];
                    return [{ text: "reiniciar curso", action: restartCourse }];
                }
            }
        };

        // LÓGICA DE PDF INTEGRADA
        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'px', format: [800, 600] });
            const img = new Image();
            img.src = 'certificado_fondo.png';
            img.onload = function() {
                doc.addImage(img, 'PNG', 0, 0, 800, 600);
                doc.setTextColor(81, 17, 145);
                doc.setFont("Montserrat", "bold");
                doc.setFontSize(28);
                doc.text(state.userName.toUpperCase(), 400, 280, { align: "center" });
                doc.setFontSize(18);
                doc.text("DNI: " + state.userDni, 400, 315, { align: "center" });
                const f = new Date().toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
                doc.setFontSize(14); doc.setFont("Montserrat", "normal");
                doc.text("Completado el " + f, 400, 350, { align: "center" });
                doc.save(`Certificado_Sinba_${state.userName}.pdf`);
            };
            img.onerror = () => alert("Error al cargar 'certificado_fondo.png'");
        }

        function renderTimeline() {
            let phaseIdx = 0;
            if (phases.datos.includes(state.step)) phaseIdx = 1;
            else if (phases.tema1.includes(state.step)) phaseIdx = 2;
            else if (phases.tema2.includes(state.step)) phaseIdx = 3;
            else if (phases.tema3.includes(state.step)) phaseIdx = 4;
            else if (phases.test.includes(state.step)) phaseIdx = 5;

            document.getElementById("timeline-progress").style.width = ((phaseIdx - 1) / 4 * 100) + "%";
            for (let i = 1; i <= 5; i++) {
                const item = document.getElementById(`step-${i}`);
                if(!item) continue;
                item.classList.remove("active", "completed");
                if (i < phaseIdx) item.classList.add("completed");
                if (i === phaseIdx) item.classList.add("active");
                if (phaseIdx === 5) item.classList.add("disabled");
            }
        }

        function render() {
            renderTimeline();
            const stepData = steps[state.step];
            const container = document.getElementById("app-content");
            const nav = document.getElementById("main-nav");

            container.innerHTML = "";
            const isStart = ["intro", "registro", "confirmacion", "politica"].includes(state.step);
            nav.style.display = isStart ? "none" : "flex";

            const mainText = stepData.dynamicContent ? stepData.dynamicContent() : stepData.content;
            container.innerHTML += `<p class="text-sm md:text-base leading-relaxed mb-4">${mainText}</p>`;

            // JUEGO DE EMPAREJAR TEMA 2
            if (stepData.isMatching) {
                const grid = document.createElement("div"); grid.className = "matching-grid";
                const leftCont = document.createElement("div"); leftCont.className = "flex flex-col gap-3";
                const rightCont = document.createElement("div"); rightCont.className = "flex flex-col gap-3";
                stepData.leftItems.forEach(item => leftCont.appendChild(createMatchCard(item, 'left')));
                stepData.rightItems.forEach(item => rightCont.appendChild(createMatchCard(item, 'right')));
                grid.append(leftCont, rightCont); container.appendChild(grid);
                const nxt = document.createElement("button"); nxt.className = "btn-sinba btn-next-step col-span-2"; nxt.id = "btn-match-next"; nxt.innerText = "siguiente"; nxt.onclick = () => { state.step = stepData.next; state.matchesFound = 0; render(); };
                container.appendChild(nxt); return;
            }

            if (stepData.image) container.innerHTML += `<img src="${stepData.image}" class="img-content">`;
            if (stepData.video) container.innerHTML += `<div class="video-container"><iframe src="${stepData.video}" frameborder="0" allowfullscreen></iframe></div>`;
            if (stepData.inputs) stepData.inputs.forEach(i => container.innerHTML += `<input type="text" id="${i.id}" placeholder="${i.placeholder}" value="${state[i.key] || ''}">`);

            const buttonArea = document.createElement("div");
            buttonArea.className = stepData.isGridTest ? "grid-container" : "flex flex-col w-full";
            
            const nextBtn = document.createElement("button");
            nextBtn.className = "btn-sinba btn-next-step col-span-2";
            nextBtn.innerText = "siguiente";

            const btns = stepData.dynamicButtons ? stepData.dynamicButtons() : stepData.buttons;
            btns?.forEach(btn => {
                if (stepData.isTest || stepData.isGridTest) {
                    const card = document.createElement("div");
                    card.className = stepData.isGridTest ? "flip-card flip-card-grid" : "flip-card";
                    const frontClass = stepData.isGridTest ? "flip-card-front flip-card-front-white" : "flip-card-front";
                    const frontHTML = stepData.isGridTest ? `<img src="${btn.img}"><span>${btn.text}</span>` : btn.text;

                    card.innerHTML = `<div class="flip-card-inner"><div class="${frontClass}">${frontHTML}</div><div class="flip-card-back ${btn.isCorrect ? 'bg-correct' : 'bg-incorrect'}">${btn.feedback}</div></div>`;
                    card.onclick = () => {
                        if (card.classList.contains("is-flipped")) return;
                        card.classList.add("is-flipped");
                        if (btn.isCorrect && state.step.startsWith('q')) state.score++;
                        nextBtn.style.display = "block";
                        const qMap = { "q1":"q2", "q2":"q3", "q3":"q4", "q4":"q5", "q5":"resultado" };
                        nextBtn.onclick = () => { state.history.push(state.step); state.step = qMap[state.step] || btn.next; render(); };
                    };
                    buttonArea.appendChild(card);
                } else {
                    const b = document.createElement("button"); b.className = "btn-sinba"; b.innerText = btn.text;
                    b.onclick = () => {
                        if (stepData.inputs) {
                            stepData.inputs.forEach(inp => state[stepData.inputs.find(x => x.id === inp.id).key] = document.getElementById(inp.id).value);
                            if(!state.userName || !state.userDni) return alert("Completa tus datos");
                        }
                        if (btn.action) btn.action(); else { state.history.push(state.step); state.step = btn.next; render(); }
                    };
                    buttonArea.appendChild(b);
                }
            });
            buttonArea.appendChild(nextBtn); container.appendChild(buttonArea);
        }

        // FUNCIONES MATCHING GAME
        function createMatchCard(item, side) {
            const card = document.createElement("div"); card.className = "match-card"; card.id = `card-${item.id}`;
            card.innerHTML = `<div class="match-card-inner"><div class="match-front"><img src="${item.img}"><span>${item.text}</span></div><div class="match-back" id="back-${item.id}"></div></div>`;
            card.onclick = () => handleMatchClick(item, side); return card;
        }

        function handleMatchClick(item, side) {
            const card = document.getElementById(`card-${item.id}`);
            if (card.classList.contains('is-flipped') || card.classList.contains('matched')) return;
            document.querySelectorAll(`.match-card`).forEach(c => { if (c.id.includes(side === 'left' ? 'L' : 'R')) c.classList.remove('selected-lila'); });
            card.classList.add('selected-lila'); state.matchingSelections[side] = item;
            if (state.matchingSelections.left && state.matchingSelections.right) checkMatch();
        }

        function checkMatch() {
            const L = state.matchingSelections.left; const R = state.matchingSelections.right;
            const LC = document.getElementById(`card-${L.id}`); const RC = document.getElementById(`card-${R.id}`);
            const LB = document.getElementById(`back-${L.id}`); const RB = document.getElementById(`back-${R.id}`);
            const isCorrect = L.matchId === R.id;
            if (isCorrect) {
                LB.innerText = L.feedback; LB.className = "match-back bg-correct"; RB.innerText = "¡Correcto!"; RB.className = "match-back bg-correct";
                LC.classList.remove('selected-lila'); RC.classList.remove('selected-lila'); LC.classList.add('is-flipped', 'matched'); RC.classList.add('is-flipped', 'matched');
                state.matchesFound++; if (state.matchesFound === 3) document.getElementById('btn-match-next').style.display = "block";
            } else {
                LB.innerText = "❌ Incorrecto. Revisa los colores."; LB.className = "match-back bg-incorrect"; RB.innerText = "❌ No coincide"; RB.className = "match-back bg-incorrect";
                LC.classList.remove('selected-lila'); RC.classList.remove('selected-lila'); LC.classList.add('is-flipped'); RC.classList.add('is-flipped');
                setTimeout(() => { LC.classList.remove('is-flipped'); RC.classList.remove('is-flipped'); }, 3000);
            }
            state.matchingSelections = { left: null, right: null };
        }

        function jumpTo(t) { if (phases.test.includes(state.step)) return; state.history.push(state.step); state.step = t; render(); }
        function goBack() { if (state.history.length > 0) { state.step = state.history.pop(); if (state.step === 'test_intro') state.score = 0; render(); } }
        function goHome() { if (confirm("¿Reiniciar?")) location.reload(); }
        function retryTest() { state.testAttempts++; state.score = 0; state.step = "q1"; render(); }
        function restartCourse() { location.reload(); }

        window.onload = render;
    </script>
</body>
</html>
