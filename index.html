<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación | sinba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #511191; --light: #F9FAFB; --correct: #27ae60; --incorrect: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--light); color: #333; margin: 0; padding: 0; }
        
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #eee; z-index: 1000; display: none; }
        #progress-fill { height: 100%; background: var(--purple); width: 0%; transition: width 0.4s; }

        .app-card { background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 500px; min-height: 600px; display: flex; flex-direction: column; position: relative; margin: 20px; }
        .content-body { padding: 40px 30px 100px 30px; flex-grow: 1; text-align: center; }
        
        .btn-sinba { background: var(--purple); color: white; padding: 16px 20px; border-radius: 14px; border: none; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; font-size: 15px; transition: 0.2s; text-transform: lowercase; }
        .btn-sinba:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-next-step { background: #333; margin-top: 25px; display: none; animation: fadeIn 0.5s; }

        /* Flip Card Animation */
        .flip-card { perspective: 1000px; width: 100%; height: 110px; margin-bottom: 12px; cursor: pointer; border: none; background: none; padding: 0; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 14px; display: flex; align-items: center; justify-content: center; padding: 15px; font-weight: 600; font-size: 14px; color: white; }
        .flip-card-front { background-color: var(--purple); text-transform: lowercase; }
        .flip-card-back { transform: rotateY(180deg); font-size: 12px; font-weight: 400; text-align: left; flex-direction: column; align-items: flex-start; }
        .bg-correct { background-color: var(--correct); }
        .bg-incorrect { background-color: var(--incorrect); }

        .nav-footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: white; border-radius: 0 0 24px 24px; }
        .nav-btn { color: var(--purple); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 13px; padding: 8px; border-radius: 8px; }

        .logo { max-height: 60px; max-width: 180px; margin: 0 auto 25px auto; display: block; object-fit: contain; }
        .img-content { width: 100%; border-radius: 15px; margin: 15px 0; object-fit: cover; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; border-radius: 15px; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top:0; left: 0; width: 100%; height: 100%; }
        
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; }
        .fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="progress-container"><div id="progress-fill"></div></div>

    <div class="app-card">
        <div class="content-body fade" id="app-content"></div>
        <div class="nav-footer" id="main-nav" style="display: none;">
            <div class="nav-btn" onclick="goBack()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg> anterior</div>
            <div class="nav-btn" onclick="goHome()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></div>
        </div>
    </div>

    <script>
        let state = { step: "intro", history: [], userName: "", userDni: "", score: 0, testAttempts: 0 };

        const steps = {
            "intro": {
                logo: true,
                content: `¡Hola!👋 ¿Te imaginas un mundo sin basura?<br><br>En este micro curso aprenderás cómo segregar correctamente en tu empresa. Al finalizar, recibirás un certificado.`,
                buttons: [{ text: "registrarme", next: "registro" }]
            },
            "registro": {
                logo: true,
                content: `🟩⬜⬜⬜⬜⬜<br>Escribe tu nombre completo y DNI para tu certificado.`,
                inputs: [
                    { id: "reg-name", placeholder: "Nombre y Apellido", key: "userName" },
                    { id: "reg-dni", placeholder: "DNI (8 dígitos)", key: "userDni" }
                ],
                buttons: [{ text: "continuar", next: "confirmacion" }]
            },
            "confirmacion": {
                logo: true,
                dynamicContent: () => `🟩🟩⬜⬜⬜<br>¿Te parece bien que usemos estos datos?<br><b>${state.userName}</b><br>DNI: ${state.userDni}`,
                buttons: [{ text: "sí, está bien", next: "politica" }, { text: "no, corregir", next: "registro" }]
            },
            "politica": {
                content: `Antes de empezar, ¿aceptas nuestra política de confidencialidad?<br><br>musa.la/politica-de-privacidad/`,
                buttons: [
                    { text: "acepto", next: "ruta" },
                    { text: "no acepto", feedback: "Es necesario aceptar para continuar.", next: "politica" }
                ]
            },
            "ruta": {
                content: `<b>Ruta de aprendizaje</b>`,
                image: "Imagen1.png", 
                buttons: [{ text: "¡empecemos!", next: "tema1_1" }]
            },
            // TEMA 1
            "tema1_1": {
                content: `<b>Tema 1: ¿Cómo debo segregar?</b><br><br>Clasificar correctamente evita la contaminación. 🌿♻️<br><br>Separa en orgánicos, reciclables y generales.`,
                image: "Imagen2.png",
                buttons: [{ text: "revisemos cada categoría", next: "tema1_org" }]
            },
            "tema1_org": {
                content: `🌱 <b>Residuos orgánicos (tacho marrón)</b><br><br>Residuos que pueden descomponerse ya que derivan de insumos animales o vegetales.`,
                video: "https://www.youtube.com/embed/EjemploVideoOrganicos", // REEMPLAZAR URL
                buttons: [{ text: "continuar", next: "tema1_rec" }]
            },
            "tema1_rec": {
                content: `♻️ <b>Reciclaje (tacho verde)</b><br><br>Materiales que pueden convertirse en nuevos productos: plástico, papel, cartón, metales y vidrios.`,
                video: "https://www.youtube.com/embed/EjemploVideoReciclables", // REEMPLAZAR URL
                buttons: [{ text: "¡practiquemos!", next: "practica1" }]
            },
            "practica1": {
                isTest: true,
                content: `¿Cuáles de estos residuos pueden ser reciclados? Dale click a las opciones del tacho verde.`,
                buttons: [
                    { text: "una lata con restos de atún", isCorrect: false, feedback: "⚠️ Si tiene muchos restos de comida, debe ir a la basura. Si la limpiamos, puede ir a reciclaje.", next: "tema1_gen" },
                    { text: "un tetrapack", isCorrect: true, feedback: "✅ ¡Correcto! Es reciclable.", next: "tema1_gen" },
                    { text: "una botella de vidrio", isCorrect: true, feedback: "✅ ¡Correcto! Es reciclable.", next: "tema1_gen" },
                    { text: "una taza", isCorrect: false, feedback: "❌ No es reciclable. Soporta más calor que el vidrio común. Va a la basura.", next: "tema1_gen" }
                ]
            },
            "tema1_gen": {
                content: `🚮 <b>Residuos generales (tacho negro)</b><br><br>Todo lo que no sea orgánico ni reciclable, como envases sucios o degradados.`,
                video: "https://www.youtube.com/embed/EjemploVideoGenerales", // REEMPLAZAR URL
                buttons: [{ text: "continuar al tema 2", next: "tema2_1" }]
            },
            // TEMA 2
            "tema2_1": {
                content: `<b>Tema 2: ¿Dónde lo separo?</b><br><br>🟤 Marrón: Orgánicos<br>🟢 Verde: Reciclaje<br>⚫ Negro: Basura`,
                buttons: [{ text: "continuar", next: "tema2_bolsas" }]
            },
            "tema2_bolsas": {
                isTest: true,
                content: `¿Qué bolsa debo colocar en cada tacho? Une cada color con su tacho.`,
                buttons: [
                    { text: "tacho marrón", isCorrect: true, feedback: "🟤 Bolsa marrón: Gruesa para evitar derrames de orgánicos.", next: "tema2_acopio" },
                    { text: "tacho verde", isCorrect: true, feedback: "🟢 Bolsa transparente: Para evidenciar el reciclaje.", next: "tema2_acopio" },
                    { text: "tacho negro", isCorrect: true, feedback: "⚫ Bolsa negra: Para lo que no podemos rescatar.", next: "tema2_acopio" }
                ]
            },
            "tema2_acopio": {
                content: `Al retirar las bolsas, llévalas al acopio correspondiente para ser realmente reaprovechados.`,
                image: "Imagen20.png",
                buttons: [{ text: "continuar al tema 3", next: "tema3_video" }]
            },
            // TEMA 3
            "tema3_video": {
                content: `<b>Tema 3: Ciclo sinba</b><br><br>Mira qué pasa con tus residuos cuando llegan a nuestra Biofábrica. 🌍✨`,
                video: "https://www.youtube.com/embed/dQw4w9WgXcQ", // Reemplazar con real
                buttons: [{ text: "continuar", next: "tema3_practica" }]
            },
            "tema3_practica": {
                isTest: true,
                content: `Situación: Una bolsa de orgánicos llega con guantes de látex y plásticos mezclados. ¿Qué hacemos?`,
                buttons: [
                    { text: "procesarlos igual", isCorrect: false, feedback: "❌ Incorrecto. No se pueden procesar así.", next: "test_intro" },
                    { text: "enviarlos a la basura", isCorrect: true, feedback: "✔️ Correcto. Se encuentran muy contaminados y se pierden recursos.", next: "test_intro" }
                ]
            },
            // TEST FINAL
            "test_intro": {
                content: `📝 <b>¿Listo para el test final?</b><br><br>Responde 5 preguntas. Necesitas 3 correctas para certificar.`,
                buttons: [{ text: "comencemos", next: "q1" }]
            },
            "q1": {
                isTest: true,
                content: `1️⃣ ¿Dónde va una bolsa de carnes o embutidos al vacío? 🥩`,
                buttons: [
                    { text: "orgánicos", isCorrect: false, feedback: "❌ No es correcto. Estos materiales tienen líquidos y grasas residuales que impiden su reciclaje. Deben ir a la basura (⚫tacho negro)", next: "q2" },
                    { text: "basura", isCorrect: true, feedback: "✔️ Correcto. Este tipo de empaque es contaminado y debe ir a residuos generales (⚫tacho negro).", next: "q2" }
                ]
            },
            "q2": {
                isTest: true,
                content: `2️⃣ ¿Dónde van restos vegetales como cáscaras de plátano? 🍌`,
                buttons: [
                    { text: "orgánicos", isCorrect: true, feedback: "✔️ ¡Excelente! Estos sirven para compostaje. Deben ir al 🟤tacho marrón.", next: "q3" },
                    { text: "basura", isCorrect: false, feedback: "❌ No es correcto. Estos residuos no van al tacho negro, ¡pueden tener una segunda vida! Deben ir al 🟤tacho marrón.", next: "q3" }
                ]
            },
            "q3": {
                isTest: true,
                content: `3️⃣ ¿Dónde debe ir una bolsa de leche vacía?`,
                buttons: [
                    { text: "reciclaje", isCorrect: false, feedback: "❌ No es correcto. Estas bolsas suelen tener varias capas de materiales, por lo que no pueden reciclarse. Debe ir al ⚫tacho negro.", next: "q4" },
                    { text: "basura", isCorrect: true, feedback: "✔️ ¡Correcto! Estas bolsas son de material no reciclable y deben ir a residuos generales (⚫tacho negro.)", next: "q4" }
                ]
            },
            "q4": {
                isTest: true,
                content: `4️⃣ ¿Dónde van las envolturas de plástico de fideos?`,
                buttons: [
                    { text: "reciclaje", isCorrect: false, feedback: "❌ No es correcto. Aunque son de plástico, este tipo no se puede reciclar. Colócalos en el ⚫ tacho negro.", next: "q5" },
                    { text: "basura", isCorrect: true, feedback: "✔️ ¡Correcto! Estas bolsas son de material no reciclable y deben ir a residuos generales (⚫tacho negro.)", next: "q5" }
                ]
            },
            "q5": {
                isTest: true,
                content: `5️⃣ ¿Dónde deben ir las latas de conserva limpias? 🥫`,
                buttons: [
                    { text: "reciclaje", isCorrect: true, feedback: "✔️ ¡Correcto! Las latas son material reciclable y pueden tener una nueva vida si están limpias.♻️ Colócalas en el 🟢tacho verde.", next: "resultado" },
                    { text: "basura", isCorrect: false, feedback: "❌ No es correcto. Si están limpias, no deben ir a la basura. colócalas en el 🟢tacho verde.", next: "resultado" }
                ]
            },
            "resultado": {
                dynamicContent: () => state.score >= 3 ? 
                    `🎉 ¡Felicitaciones!<br>Acertaste ${state.score} de 5.<br>Gracias por ser parte del cambio. 💜` :
                    `Acertaste ${state.score} de 5.<br>Ánimo, no alcanzaste el mínimo. Tienes una oportunidad más.`,
                dynamicButtons: () => {
                    if(state.score >= 3) return [{ text: "descargar mi constancia", action: downloadCert }, { text: "volver al inicio", next: "intro" }];
                    if(state.testAttempts < 1) return [{ text: "probar una vez más", action: retryTest }];
                    return [{ text: "reiniciar curso", action: restartCourse }];
                }
            }
        };

        function render() {
            const stepData = steps[state.step];
            const container = document.getElementById("app-content");
            const nav = document.getElementById("main-nav");
            const progressCont = document.getElementById("progress-container");
            const progressFill = document.getElementById("progress-fill");

            const isStart = ["intro", "registro", "confirmacion", "politica"].includes(state.step);
            nav.style.display = isStart ? "none" : "flex";
            progressCont.style.display = isStart ? "none" : "block";

            const keys = Object.keys(steps);
            progressFill.style.width = (keys.indexOf(state.step) / (keys.length - 1) * 100) + "%";

            container.innerHTML = "";
            if(stepData.logo) container.innerHTML += `<img src="logo.png" class="logo">`;
            container.innerHTML += `<p class="text-lg leading-relaxed mb-4">${stepData.dynamicContent ? stepData.dynamicContent() : stepData.content}</p>`;

            if(stepData.image) container.innerHTML += `<img src="${stepData.image}" class="img-content">`;
            if(stepData.video) container.innerHTML += `<div class="video-container"><iframe src="${stepData.video}" frameborder="0" allowfullscreen></iframe></div>`;

            if(stepData.inputs) {
                stepData.inputs.forEach(inp => container.innerHTML += `<input type="text" id="${inp.id}" placeholder="${inp.placeholder}" value="${state[inp.key] || ''}">`);
            }

            const buttonArea = document.createElement("div");
            const nextBtn = document.createElement("button");
            nextBtn.className = "btn-sinba btn-next-step";
            nextBtn.innerText = "siguiente";

            const btns = stepData.dynamicButtons ? stepData.dynamicButtons() : stepData.buttons;
            btns?.forEach(btn => {
                if(stepData.isTest) {
                    const card = document.createElement("div");
                    card.className = "flip-card";
                    card.innerHTML = `<div class="flip-card-inner">
                        <div class="flip-card-front">${btn.text}</div>
                        <div class="flip-card-back ${btn.isCorrect ? 'bg-correct' : 'bg-incorrect'}">${btn.feedback}</div>
                    </div>`;
                    card.onclick = () => {
                        if(card.classList.contains("is-flipped")) return;
                        buttonArea.querySelectorAll(".flip-card").forEach(c => c.style.pointerEvents = "none");
                        card.classList.add("is-flipped");
                        if(btn.isCorrect && state.step.startsWith('q')) state.score++;
                        nextBtn.style.display = "block";
                        nextBtn.onclick = () => { state.history.push(state.step); state.step = btn.next; render(); };
                    };
                    buttonArea.appendChild(card);
                } else {
                    const b = document.createElement("button");
                    b.className = "btn-sinba " + (btn.action ? "bg-gray-800" : "");
                    b.innerText = btn.text;
                    b.onclick = () => {
                        if(stepData.inputs) {
                            stepData.inputs.forEach(i => state[stepData.inputs.find(x => x.id === i.id).key] = document.getElementById(i.id).value);
                            if(!state.userName || !state.userDni) return alert("Completa tus datos");
                        }
                        if(btn.action) btn.action();
                        else { state.history.push(state.step); state.step = btn.next; render(); }
                    };
                    buttonArea.appendChild(b);
                }
            });
            buttonArea.appendChild(nextBtn);
            container.appendChild(buttonArea);
        }

        function goBack() { if(state.history.length > 0) { state.step = state.history.pop(); if(state.step === 'test_intro') state.score = 0; render(); } }
        function goHome() { if(confirm("¿Volver al inicio?")) restartCourse(); }
        function retryTest() { state.testAttempts++; state.score = 0; state.step = "q1"; render(); }
        function restartCourse() { state = { step: "intro", history: [], userName: "", userDni: "", score: 0, testAttempts: 0 }; render(); }

        function downloadCert() {
            const canvas = document.createElement("canvas"); canvas.width = 800; canvas.height = 600;
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "white"; ctx.fillRect(0,0,800,600);
            ctx.strokeStyle = "#511191"; ctx.lineWidth = 20; ctx.strokeRect(0,0,800,600);
            ctx.fillStyle = "#511191"; ctx.font = "bold 40px Montserrat"; ctx.textAlign = "center";
            ctx.fillText("CONSTANCIA DE CAPACITACIÓN", 400, 150);
            ctx.fillStyle = "#333"; ctx.font = "30px Montserrat"; ctx.fillText(state.userName.toUpperCase(), 400, 300);
            ctx.fillText("DNI: " + state.userDni, 400, 360);
            ctx.font = "18px Montserrat"; ctx.fillText("completó con éxito el curso de sinba.", 400, 450);
            const link = document.createElement('a'); link.download = 'Constancia_sinba.png';
            link.href = canvas.toDataURL(); link.click();
        }

        window.onload = render;
    </script>
</body>
</html>
