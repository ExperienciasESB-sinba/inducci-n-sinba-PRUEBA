<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación | sinba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #511191; --light: #F9FAFB; --correct: #27ae60; --incorrect: #e74c3c; --gray: #d1d5db; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--light); color: #333; margin: 0; padding: 0; }
        
        /* Línea de Tiempo Superior */
        .timeline-container { width: 100%; max-width: 600px; margin: 20px auto; display: flex; justify-content: space-between; align-items: flex-start; position: relative; padding: 0 10px; }
        .timeline-line { position: absolute; top: 15px; left: 40px; right: 40px; height: 2px; background: var(--gray); z-index: 1; }
        .timeline-progress { position: absolute; top: 15px; left: 40px; height: 2px; background: var(--purple); z-index: 2; transition: width 0.4s ease; width: 0%; }
        .step-item { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; width: 60px; cursor: pointer; transition: 0.3s; }
        .step-item.disabled { cursor: not-allowed; opacity: 0.6; }
        .step-circle { width: 30px; height: 30px; border-radius: 50%; background: white; border: 2px solid var(--gray); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; margin-bottom: 5px; transition: 0.3s; }
        .step-label { font-size: 10px; text-align: center; font-weight: 600; text-transform: uppercase; color: var(--gray); }
        
        .step-item.active .step-circle { border-color: var(--purple); background: var(--purple); color: white; }
        .step-item.active .step-label { color: var(--purple); }
        .step-item.completed .step-circle { background: var(--purple); border-color: var(--purple); color: white; }

        /* Card Principal */
        .app-card { background: white; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 500px; min-height: 550px; display: flex; flex-direction: column; position: relative; margin: 0 auto 40px auto; }
        .content-body { padding: 40px 30px 100px 30px; flex-grow: 1; text-align: center; }
        
        /* Botones */
        .btn-sinba { background: var(--purple); color: white; padding: 16px 20px; border-radius: 14px; border: none; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; font-size: 15px; transition: 0.2s; text-transform: lowercase; }
        .btn-sinba:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-next-step { background: #333; margin-top: 25px; display: none; animation: fadeIn 0.5s; }

        /* Flip Card Animation */
        .flip-card { perspective: 1000px; width: 100%; height: 110px; margin-bottom: 12px; cursor: pointer; border: none; background: none; padding: 0; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 14px; display: flex; align-items: center; justify-content: center; padding: 15px; font-weight: 600; font-size: 14px; color: white; }
        .flip-card-front { background-color: var(--purple); text-transform: lowercase; }
        .flip-card-back { transform: rotateY(180deg); font-size: 12px; font-weight: 400; text-align: left; flex-direction: column; align-items: flex-start; }
        .bg-correct { background-color: var(--correct); }
        .bg-incorrect { background-color: var(--incorrect); }

        .nav-footer { position: absolute; bottom: 0; left: 0; width: 100%; height: 70px; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: white; border-radius: 0 0 24px 24px; }
        .nav-btn { color: var(--purple); font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 13px; padding: 8px; border-radius: 8px; }

        .logo { max-height: 60px; max-width: 180px; margin: 0 auto 25px auto; display: block; object-fit: contain; }
        .img-content { width: 100%; border-radius: 15px; margin: 15px 0; object-fit: cover; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; margin: 15px 0; border-radius: 15px; overflow: hidden; background: #000; }
        .video-container iframe { position: absolute; top:0; left: 0; width: 100%; height: 100%; }
        
        input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; }
        .fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4">

    <!-- Línea de Tiempo -->
    <div class="timeline-container" id="timeline">
        <div class="timeline-line"></div>
        <div class="timeline-progress" id="timeline-progress"></div>
        
        <div class="step-item" onclick="jumpTo('intro')" id="step-1">
            <div class="step-circle">1</div>
            <div class="step-label">Datos</div>
        </div>
        <div class="step-item" onclick="jumpTo('tema1_1')" id="step-2">
            <div class="step-circle">2</div>
            <div class="step-label">Tema 1</div>
        </div>
        <div class="step-item" onclick="jumpTo('tema2_1')" id="step-3">
            <div class="step-circle">3</div>
            <div class="step-label">Tema 2</div>
        </div>
        <div class="step-item" onclick="jumpTo('tema3_video')" id="step-4">
            <div class="step-circle">4</div>
            <div class="step-label">Tema 3</div>
        </div>
        <div class="step-item disabled" id="step-5">
            <div class="step-circle">5</div>
            <div class="step-label">Test</div>
        </div>
    </div>

    <div class="app-card">
        <div class="content-body fade" id="app-content"></div>
        
        <div class="nav-footer" id="main-nav" style="display: none;">
            <div class="nav-btn" onclick="goBack()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"></path></svg> anterior</div>
            <div class="nav-btn" onclick="goHome()"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></div>
        </div>
    </div>

    <script>
        let state = { step: "intro", history: [], userName: "", userDni: "", score: 0, testAttempts: 0 };

        // Definición de las fases para la línea de tiempo
        const phases = {
            "datos": ["intro", "registro", "confirmacion", "politica", "ruta"],
            "tema1": ["tema1_1", "tema1_org", "tema1_rec", "practica1", "tema1_gen"],
            "tema2": ["tema2_1", "tema2_bolsas", "tema2_acopio"],
            "tema3": ["tema3_video", "tema3_practica"],
            "test": ["test_intro", "q1", "q2", "q3", "q4", "q5", "resultado"]
        };

        const steps = {
            "intro": { logo: true, content: `¡Hola!👋 ¿Te imaginas un mundo sin basura?<br><br>En este micro curso aprenderás cómo segregar correctamente en tu empresa.`, buttons: [{ text: "registrarme", next: "registro" }] },
            "registro": { logo: true, content: `🟩⬜⬜⬜⬜⬜<br>Escribe tu nombre completo y DNI para tu certificado.`, inputs: [{ id: "n", placeholder: "Nombre", key: "userName" }, { id: "d", placeholder: "DNI", key: "userDni" }], buttons: [{ text: "continuar", next: "confirmacion" }] },
            "confirmacion": { logo: true, dynamicContent: () => `🟩🟩⬜⬜⬜<br>¿Datos correctos?<br><b>${state.userName}</b> - DNI: ${state.userDni}`, buttons: [{ text: "sí", next: "politica" }, { text: "no", next: "registro" }] },
            "politica": { content: `musa.la/politica-de-privacidad/`, buttons: [{ text: "acepto", next: "ruta" }, { text: "no acepto", feedback: "Debes aceptar." }] },
            "ruta": { content: `<b>Ruta de aprendizaje</b>`, image: "Imagen1.png", buttons: [{ text: "¡empecemos!", next: "tema1_1" }] },
            
            "tema1_1": { content: `<b>Tema 1: ¿Cómo debo segregar?</b>`, image: "Imagen2.png", buttons: [{ text: "continuar", next: "tema1_org" }] },
            "tema1_org": { content: `🌱 <b>Residuos orgánicos (tacho marrón)</b>`, video: "https://www.youtube.com/embed/Ejemplo1", buttons: [{ text: "siguiente", next: "tema1_rec" }] },
            "tema1_rec": { content: `♻️ <b>Reciclaje (tacho verde)</b>`, video: "https://www.youtube.com/embed/Ejemplo2", buttons: [{ text: "practicar", next: "practica1" }] },
            "practica1": { isTest: true, content: `¿Cuáles pueden ser reciclados?`, buttons: [
                { text: "Lata con restos", isCorrect: false, feedback: "❌ No, está contaminada.", next: "tema1_gen" },
                { text: "Botella vidrio", isCorrect: true, feedback: "✅ Correcto.", next: "tema1_gen" }
            ]},
            "tema1_gen": { content: `🚮 <b>Residuos generales (negro)</b>`, video: "https://www.youtube.com/embed/Ejemplo3", buttons: [{ text: "tema 2", next: "tema2_1" }] },

            "tema2_1": { content: `<b>Tema 2: Lineamientos operativos</b>`, buttons: [{ text: "continuar", next: "tema2_bolsas" }] },
            "tema2_bolsas": { isTest: true, content: `¿Qué bolsa en qué tacho?`, buttons: [{ text: "Marrón", isCorrect: true, feedback: "✅ Correcto.", next: "tema2_acopio" }] },
            "tema2_acopio": { content: `Lleva las bolsas al acopio.`, image: "Imagen20.png", buttons: [{ text: "tema 3", next: "tema3_video" }] },

            "tema3_video": { content: `<b>Tema 3: Ciclo sinba</b>`, video: "https://www.youtube.com/embed/dQw4w9WgXcQ", buttons: [{ text: "continuar", next: "tema3_practica" }] },
            "tema3_practica": { isTest: true, content: `Bolsa contaminada, ¿qué hacemos?`, buttons: [{ text: "Basura", isCorrect: true, feedback: "✅ Correcto.", next: "test_intro" }] },

            "test_intro": { content: `📝 <b>¿Listo para el test?</b>`, buttons: [{ text: "comenzar", next: "q1" }] },
            "q1": { isTest: true, content: `1️⃣ ¿Dónde va la bolsa de carne al vacío?`, buttons: [{ text: "Basura", isCorrect: true, feedback: "✔️ Correcto.", next: "q2" }, { text: "Orgánicos", isCorrect: false, feedback: "❌ No.", next: "q2" }] },
            "q2": { isTest: true, content: `2️⃣ ¿Dónde van las cáscaras de plátano?`, buttons: [{ text: "Orgánicos", isCorrect: true, feedback: "✔️ Correcto.", next: "resultado" }] },
            "resultado": { dynamicContent: () => `Acertaste ${state.score} de 2.`, dynamicButtons: () => [{ text: "Finalizar", action: downloadCert }] }
        };

        function renderTimeline() {
            let phaseIdx = 0;
            if (phases.datos.includes(state.step)) phaseIdx = 1;
            else if (phases.tema1.includes(state.step)) phaseIdx = 2;
            else if (phases.tema2.includes(state.step)) phaseIdx = 3;
            else if (phases.tema3.includes(state.step)) phaseIdx = 4;
            else if (phases.test.includes(state.step)) phaseIdx = 5;

            // Actualizar visual de la línea
            document.getElementById("timeline-progress").style.width = ((phaseIdx - 1) / 4 * 100) + "%";

            for (let i = 1; i <= 5; i++) {
                const item = document.getElementById(`step-${i}`);
                item.classList.remove("active", "completed");
                if (i < phaseIdx) item.classList.add("completed");
                if (i === phaseIdx) item.classList.add("active");
                
                // Bloquear clics si estamos en la fase del test (5)
                if (phaseIdx === 5) {
                    item.onclick = null;
                    item.classList.add("disabled");
                } else {
                    item.classList.remove("disabled");
                    if (i === 1) item.onclick = () => jumpTo('intro');
                    if (i === 2) item.onclick = () => jumpTo('tema1_1');
                    if (i === 3) item.onclick = () => jumpTo('tema2_1');
                    if (i === 4) item.onclick = () => jumpTo('tema3_video');
                }
            }
        }

        function jumpTo(targetStep) {
            if (phases.test.includes(state.step)) return; // No saltar si estamos en el test
            state.history.push(state.step);
            state.step = targetStep;
            render();
        }

        function render() {
            renderTimeline();
            const stepData = steps[state.step];
            const container = document.getElementById("app-content");
            const nav = document.getElementById("main-nav");

            container.innerHTML = "";
            nav.style.display = (state.step === "intro" || state.step === "registro") ? "none" : "flex";

            if (stepData.logo) container.innerHTML += `<img src="logo.png" class="logo">`;
            container.innerHTML += `<p class="text-lg leading-relaxed mb-4">${stepData.dynamicContent ? stepData.dynamicContent() : stepData.content}</p>`;
            if (stepData.image) container.innerHTML += `<img src="${stepData.image}" class="img-content">`;
            if (stepData.video) container.innerHTML += `<div class="video-container"><iframe src="${stepData.video}" frameborder="0" allowfullscreen></iframe></div>`;
            if (stepData.inputs) stepData.inputs.forEach(i => container.innerHTML += `<input type="text" id="${i.id}" placeholder="${i.placeholder}">`);

            const buttonArea = document.createElement("div");
            const nextBtn = document.createElement("button");
            nextBtn.className = "btn-sinba btn-next-step";
            nextBtn.innerText = "siguiente";

            const btns = stepData.dynamicButtons ? stepData.dynamicButtons() : stepData.buttons;
            btns?.forEach(btn => {
                if (stepData.isTest) {
                    const card = document.createElement("div");
                    card.className = "flip-card";
                    card.innerHTML = `<div class="flip-card-inner"><div class="flip-card-front">${btn.text}</div><div class="flip-card-back ${btn.isCorrect ? 'bg-correct' : 'bg-incorrect'}">${btn.feedback}</div></div>`;
                    card.onclick = () => {
                        if (card.classList.contains("is-flipped")) return;
                        buttonArea.querySelectorAll(".flip-card").forEach(c => c.style.pointerEvents = "none");
                        card.classList.add("is-flipped");
                        if (btn.isCorrect && state.step.startsWith('q')) state.score++;
                        nextBtn.style.display = "block";
                        nextBtn.onclick = () => { state.history.push(state.step); state.step = btn.next; render(); };
                    };
                    buttonArea.appendChild(card);
                } else {
                    const b = document.createElement("button");
                    b.className = "btn-sinba";
                    b.innerText = btn.text;
                    b.onclick = () => {
                        if (stepData.inputs) {
                            stepData.inputs.forEach(inp => state[stepData.inputs.find(x => x.id === inp.id).key] = document.getElementById(inp.id).value);
                        }
                        if (btn.action) btn.action();
                        else { state.history.push(state.step); state.step = btn.next; render(); }
                    };
                    buttonArea.appendChild(b);
                }
            });
            buttonArea.appendChild(nextBtn);
            container.appendChild(buttonArea);
        }

        function goBack() { if (state.history.length > 0) { state.step = state.history.pop(); if (state.step === 'test_intro') state.score = 0; render(); } }
        function goHome() { if (confirm("¿Reiniciar?")) location.reload(); }
        function downloadCert() { alert("Generando Certificado para " + state.userName); }

        window.onload = render;
    </script>
</body>
</html>
