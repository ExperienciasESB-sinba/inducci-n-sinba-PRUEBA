<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación | sinba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
   <style>
        :root { 
            --purple: #511191; 
            --light: #F9FAFB; 
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--light); 
            color: #333; 
            margin: 0; 
            padding: 0; 
        }
        
        /* Ajuste del Logo: Centrado y Tamaño */
        .logo { 
            max-width: 200px; /* Tamaño horizontal controlado */
            max-height: 80px; /* Tamaño vertical controlado */
            display: block; 
            margin: 0 auto 30px auto; /* El 'auto' a los lados lo centra */
            object-fit: contain;
        }

        #progreso-bar { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #eee; z-index: 1000; display: none; }
        #progreso-fill { height: 100%; background: var(--purple); width: 0%; transition: width 0.4s; }
        
        .contenedor { 
            background: white; 
            border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
            width: 90%; 
            max-width: 450px; 
            padding: 40px 30px; 
            text-align: center; 
            margin: 20px;
        }

        .btn { 
            background: var(--purple); 
            color: white; 
            padding: 16px 25px; 
            border-radius: 14px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 10px; 
            font-size: 16px; 
            transition: 0.3s;
            text-transform: lowercase; /* Estilo sinba */
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .input-text { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #f0f0f0; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box;
        }
        .input-text:focus { border-color: var(--purple); }
        
        .fade { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="progreso-bar">
        <div id="progreso-fill"></div>
    </div>

    <div class="contenedor fade">
        <!-- Logo de Sinba -->
        <img src="logo.png" alt="sinba" class="logo" id="main-logo">
        
        <div id="pantalla">
            <!-- El contenido aparecerá aquí -->
            <p>Cargando experiencia...</p>
        </div>
    </div>

    <script>
        // Configuración de los mensajes
        const pasos = [
            {
                id: "inicio",
                texto: "¡Hola!👋 ¿Te imaginas un mundo sin basura, donde todos los materiales se reutilizan y no dañan el medio ambiente? <br><br> En este micro curso aprenderás cómo segregar correctamente en tu empresa. Al finalizar, recibirás un certificado. <br><br> ¿Listo para iniciar?",
                botones: [{ t: "registrarme", n: "nombre" }]
            },
            {
                id: "nombre",
                tipo: "input",
                texto: "🟩⬜⬜⬜⬜⬜<br><br>¡Muy bien! Por favor, <b>escribe tu nombre y apellido completo</b> para tu certificado.",
                campo: "userName",
                botones: [{ t: "continuar", n: "confirmar" }]
            },
            {
                id: "confirmar",
                texto: "🟩🟩⬜⬜⬜<br><br>¿Te parece bien que usemos ese nombre para tu constancia?",
                botones: [
                    { t: "sí, está bien", n: "dni" },
                    { t: "no, corregir", n: "nombre" }
                ]
            },
            {
                id: "dni",
                tipo: "input",
                texto: "Por favor, escribe los <b>8 dígitos de tu DNI</b>.",
                campo: "userDni",
                botones: [{ t: "continuar", n: "politica" }]
            },
            {
                id: "politica",
                texto: "Antes de empezar, ¿aceptas nuestra política de confidencialidad?<br><br><small style='color:blue'>musa.la/politica-de-privacidad/</small>",
                botones: [
                    { t: "acepto", n: "tema1" },
                    { t: "no acepto", f: "Es necesario aceptar para continuar.", n: "politica" }
                ]
            },
            {
                id: "tema1",
                texto: "<b>Tema 1: ¿Quiénes somos?</b><br><br>En sinba co-creamos un mundo sin basura. Nuestra misión es asegurar que nada sobre y nadie sobre.",
                botones: [{ t: "siguiente tema", n: "tema2" }]
            },
            {
                id: "tema2",
                texto: "<b>Tema 2: Segregación</b><br><br>Separar los residuos correctamente permite que los materiales se conviertan en nuevos recursos.",
                botones: [{ t: "ir a la evaluación", n: "test" }]
            },
            {
                id: "test",
                texto: "<b>Evaluación Final</b><br><br>¿Te sientes listo para empezar a trabajar sin basura?",
                botones: [{ t: "¡sí, listo!", n: "fin" }]
            },
            {
                id: "fin",
                texto: "🎉 ¡Felicidades! Has completado la capacitación de <b>sinba</b> con éxito.",
                botones: [{ t: "finalizar", n: "inicio" }]
            }
        ];

        let estado = "inicio";
        let datos = { userName: "", userDni: "" };

        function dibujar() {
            const actual = pasos.find(p => p.id === estado);
            const pantalla = document.getElementById("pantalla");
            const barra = document.getElementById("progreso-bar");
            const fill = document.getElementById("progreso-fill");

            // Control de barra de progreso (aparece después del registro)
            const esRegistro = ["inicio", "nombre", "confirmar", "dni", "politica"].includes(estado);
            barra.style.display = esRegistro ? "none" : "block";
            
            if (!esRegistro) {
                const temas = pasos.filter(p => !["inicio", "nombre", "confirmar", "dni", "politica"].includes(p.id));
                const idx = temas.findIndex(p => p.id === estado);
                fill.style.width = ((idx + 1) / temas.length * 100) + "%";
            }

            // Generar HTML
            let contenido = `<p style="font-size:18px; line-height:1.6; margin-bottom:25px;">${actual.texto}</p>`;
            
            if (actual.tipo === "input") {
                contenido += `<input type="text" id="entrada" class="input-text" placeholder="Escribe aquí...">`;
            }

            actual.botones.forEach((b, i) => {
                contenido += `<button class="btn" onclick="accion('${actual.id}', ${i})">${b.t}</button>`;
            });

            pantalla.innerHTML = contenido;
        }

        function accion(pasoId, btnIdx) {
            const paso = pasos.find(p => p.id === pasoId);
            const btn = paso.botones[btnIdx];

            if (paso.tipo === "input") {
                const valor = document.getElementById("entrada").value;
                if (!valor) return alert("Por favor completa el campo");
                datos[paso.campo] = valor;
            }

            if (btn.f) {
                alert(btn.f);
            }

            estado = btn.n;
            dibujar();
        }

        // Iniciar la app al cargar
        window.onload = dibujar;
    </script>
</body>
</html>
